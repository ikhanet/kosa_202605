<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <div class="auth-title">📝 Todo</div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="이메일" required autocomplete="email">
        <input type="password" id="auth-password" placeholder="비밀번호 (6자 이상)" required autocomplete="current-password">
        <button type="submit" id="auth-submit">로그인</button>
      </form>

      <div class="auth-divider"><span>또는</span></div>
      <button type="button" id="google-btn" class="social-btn google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.96 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 계속하기
      </button>

      <button type="button" id="github-btn" class="social-btn github-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#fff" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub로 계속하기
      </button>

      <p class="auth-message" id="auth-message"></p>
    </div>
  </div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="app-title">📝 Todo</div>
      <div class="user-info">
        <span id="user-email-display"></span>
        <button id="logout-btn">로그아웃</button>
      </div>

      <div class="progress-section">
        <div class="progress-label">
          <span>완료율</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">전체</span>
          <span class="stat-count" id="stat-total">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">완료</span>
          <span class="stat-count" id="stat-done">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">미완료</span>
          <span class="stat-count" id="stat-active">0</span>
        </div>
      </div>

      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="active">미완료</button>
        <button class="filter-btn" data-filter="done">완료</button>
      </div>
    </aside>

    <main class="main">
      <div class="input-area">
        <select id="priority-select">
          <option value="high">🔴 높음</option>
          <option value="medium" selected>🟡 중간</option>
          <option value="low">🟢 낮음</option>
        </select>
        <input
          type="text"
          id="todo-input"
          placeholder="할 일을 입력하세요..."
          autocomplete="off"
        >
        <button id="add-btn">추가</button>
      </div>

      <ul id="todo-list"></ul>

      <div class="empty-state" id="empty-state">
        <span>✨</span>
        <p>할 일이 없어요!</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
